task_id: T123zh_todo_calendar_conflict
task_name: 待办与日历冲突检测
version: "1.0"
category: workflow
difficulty: medium
tags: [general, multi_service]

services:
  - name: todo
    command: python mock_services/todo/server.py
    port: 9102
    health_check: http://localhost:9102/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/todo/reset
    env:
      TODO_FIXTURES: tasks/T123zh_todo_calendar_conflict/fixtures/todo/tasks.json
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/T123zh_todo_calendar_conflict/fixtures/calendar/events.json

prompt:
  text: |
    我的待办事项和日历安排经常冲突。请帮我：
    1. 查看所有待办事项及其截止日期
    2. 查看本周的日历安排
    3. 找出截止日期当天有大段会议无法工作的待办
    4. 给出重新安排建议：哪些待办需要提前或延后
    5. 输出冲突分析和重排建议
  language: zh

tools:
  - name: todo_list_tasks
    description: 查看待办事项列表
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "状态筛选(pending/completed/all)"
          default: pending
      required: []

  - name: todo_get_task
    description: 获取待办详情
    input_schema:
      type: object
      properties:
        task_id:
          type: string
          description: 待办ID
      required: [task_id]

  - name: calendar_list_events
    description: 查看日历事件
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: "起始日期(YYYY-MM-DD)"
        end_date:
          type: string
          description: "截止日期(YYYY-MM-DD)"
      required: []

  - name: calendar_get_event
    description: 获取事件详情
    input_schema:
      type: object
      properties:
        event_id:
          type: string
          description: 事件ID
      required: [event_id]

tool_endpoints:
  - tool_name: todo_list_tasks
    url: http://localhost:9102/todo/tasks
    method: POST
  - tool_name: todo_get_task
    url: http://localhost:9102/todo/tasks/get
    method: POST
  - tool_name: calendar_list_events
    url: http://localhost:9101/calendar/events
    method: POST
  - tool_name: calendar_get_event
    url: http://localhost:9101/calendar/events/get
    method: POST

environment:
  mock_today: "2026-03-27"
  timeout_seconds: 300
  max_turns: 20

scoring_components:
  - name: conflict_detection
    weight: 0.35
    check:
      type: llm_judge
      description: "是否正确识别3组冲突(3/27全天培训、3/28下午大会、3/30全天出差)"
  - name: resolution_plan
    weight: 0.35
    check:
      type: llm_judge
      description: "重排建议是否考虑了优先级和可行性"
  - name: plan_completeness
    weight: 0.30
    check:
      type: llm_judge
      description: "建议是否覆盖所有冲突且逻辑自洽"

safety_checks: []

expected_actions: []

judge_rubric: |
  评估助手的冲突分析和重排建议质量。

  ## 正确的冲突分析

  冲突1 — 3月27日（全天培训 9:00-17:00）：
  - TODO-301(Q1报告,high,due 3/27) — 全天培训无法完成 ✗
  - TODO-304(供应商报价,medium,due 3/27) — 同样无法完成 ✗
  → 建议：提前到3/26完成，或协调延至3/28上午

  冲突2 — 3月28日（全员大会 14:00-17:00）：
  - TODO-302(预算审批表,high,due 3/28) — 下午被占，只有上午可用 ⚠
  - TODO-307(技术文章,low,due 3/28) — 次要冲突
  → 建议：上午优先完成预算审批表(high)

  冲突3 — 3月30日（客户拜访 全天出差）：
  - TODO-303(客户PPT,high,due 3/30) — 全天出差无法专注做PPT ✗
  → 建议：PPT必须在3/29之前完成（注意3/29下午有技术分享会）

  ## 无冲突/低冲突
  - TODO-305(文档,medium,due 3/29) — 3/29上午可用+技术分享后
  - TODO-306(周报,medium,due 3/31) — 3/31较空

  评分：
  - 0.8-1.0: 3组冲突全部识别，建议合理可行
  - 0.5-0.7: 至少2组冲突识别，有基本建议
  - 0.2-0.4: 冲突识别不完整
  - 0.0-0.1: 未完成分析

reference_solution: |
  1. todo_list_tasks() → 7个待办
  2. calendar_list_events(start_date="2026-03-27", end_date="2026-03-31") → 5个事件
  3. 按日期对照：
     - 3/27: 全天培训 vs TODO-301(high)+TODO-304(medium) → 冲突
     - 3/28: 下午大会 vs TODO-302(high)+TODO-307(low) → 部分冲突
     - 3/30: 全天出差 vs TODO-303(high) → 冲突
  4. 重排建议：
     - TODO-301 → 提前至3/26
     - TODO-304 → 移至3/28上午或3/26
     - TODO-302 → 3/28上午完成
     - TODO-303 → 提前至3/29(注意下午有分享会)

primary_dimensions: [completion, robustness, communication]
