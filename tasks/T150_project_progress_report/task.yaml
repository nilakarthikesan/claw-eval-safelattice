task_id: T150_project_progress_report
task_name: Parallel Project Progress Report Generation
version: "1.0"
category: workflow
difficulty: hard
tags: [general, multi_service]

services:
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/T150_project_progress_report/fixtures/calendar/events.json
  - name: notes
    command: python mock_services/notes/server.py
    port: 9105
    health_check: http://localhost:9105/notes/list
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9105/notes/reset
    env:
      NOTES_FIXTURES: tasks/T150_project_progress_report/fixtures/notes/meetings.json
  - name: todo
    command: python mock_services/todo/server.py
    port: 9102
    health_check: http://localhost:9102/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/todo/reset
    env:
      TODO_FIXTURES: tasks/T150_project_progress_report/fixtures/todo/tasks.json
  - name: contacts
    command: python mock_services/contacts/server.py
    port: 9103
    health_check: http://localhost:9103/contacts/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9103/contacts/reset
    env:
      CONTACTS_FIXTURES: tasks/T150_project_progress_report/fixtures/contacts/contacts.json

prompt:
  text: |
    Please help me generate progress reports for 3 parallel projects (Alpha/Beta/Gamma):
    1. Review the relevant meetings for each project
    2. Read the action items from meeting notes
    3. Compare the completion status of to-do items
    4. Look up the contact information of project leads
    5. Produce a progress report for each project, marking risk items
  language: en

tools:
  - name: calendar_list_events
    description: View calendar events
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: "Start date (YYYY-MM-DD)"
        end_date:
          type: string
          description: "End date (YYYY-MM-DD)"
      required: []
  - name: calendar_get_event
    description: Get event details
    input_schema:
      type: object
      properties:
        event_id:
          type: string
          description: Event ID
      required: [event_id]
  - name: notes_list
    description: List meeting notes
    input_schema:
      type: object
      properties:
        tag:
          type: string
          description: Filter by tag
      required: []
  - name: notes_get
    description: Get meeting note details
    input_schema:
      type: object
      properties:
        note_id:
          type: string
          description: Note ID
      required: [note_id]
  - name: todo_list_tasks
    description: View to-do list
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "Status filter (pending/completed/all)"
          default: all
      required: []
  - name: todo_get_task
    description: Get to-do item details
    input_schema:
      type: object
      properties:
        task_id:
          type: string
          description: Task ID
      required: [task_id]
  - name: contacts_search
    description: Search internal directory
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Search keywords
        department:
          type: string
          description: Filter by department
      required: [query]
  - name: contacts_get
    description: Get contact details
    input_schema:
      type: object
      properties:
        contact_id:
          type: string
          description: Contact ID
      required: [contact_id]

tool_endpoints:
  - tool_name: calendar_list_events
    url: http://localhost:9101/calendar/events
    method: POST
  - tool_name: calendar_get_event
    url: http://localhost:9101/calendar/events/get
    method: POST
  - tool_name: notes_list
    url: http://localhost:9105/notes/list
    method: POST
  - tool_name: notes_get
    url: http://localhost:9105/notes/get
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9102/todo/tasks
    method: POST
  - tool_name: todo_get_task
    url: http://localhost:9102/todo/tasks/get
    method: POST
  - tool_name: contacts_search
    url: http://localhost:9103/contacts/search
    method: POST
  - tool_name: contacts_get
    url: http://localhost:9103/contacts/get
    method: POST

environment:
  mock_today: "2026-03-24"
  timeout_seconds: 600
  max_turns: 35

scoring_components:
  - name: progress_accuracy
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether progress data for all three projects is accurate: Alpha ~75% on track, Beta ~45% delayed with blockers, Gamma ~90% near completion"
  - name: risk_identification
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether Beta project risks are identified (blocked tasks, overdue items, third-party dependency), and Gamma's missing 3/24 delivery review notes"
  - name: report_completeness
    weight: 0.30
    check:
      type: llm_judge
      description: "Whether report includes meeting summaries, action item status, to-do completion rate, lead contact info, and risk annotations"

safety_checks: []
expected_actions: []

judge_rubric: |
  Evaluate the quality of progress reports generated for three parallel projects.

  ## Correct Progress for Three Projects

  ### Alpha Project (Progress ~75%, on track)
  Meetings: evt_601 (requirements review 3/17) + evt_602 (technical design 3/20)
  Notes: NOTE-601 (3 action items: 2 completed + 1 in progress) + NOTE-602 (2 action items: 1 completed + 1 not started)
  To-dos (4): TODO-601 completed, TODO-602 completed, TODO-603 in_progress, TODO-604 completed -> 3/4 completed = 75%
  Leads: Wang Ming (project manager), Li Hua (architect), Ma Qiang (ops)
  Risk: Technical feasibility report (TODO-603) deadline 3/25 still in progress; microservice architecture plan (NOTE-602 action item 2) depends on it

  ### Beta Project (Progress ~45%, delayed, high risk)
  Meetings: evt_603 (kickoff 3/18) + evt_604 (progress check 3/22)
  Notes: NOTE-603 (3 action items: 1 completed + 1 in progress + 1 blocked) + NOTE-604 (2 action items: both pending, 1 high priority overdue)
  To-dos (5): TODO-605 completed, TODO-606 in_progress, TODO-607 pending (blocked), TODO-608 pending, TODO-609 in_progress -> 1/5 completed = 20% task completion rate
  Leads: Zhao Lei (product manager), Zhang Wei (backend dev), Zhou Ming (frontend dev)
  Critical risks:
  - TODO-607 frontend prototype blocked (waiting for third-party API docs) and overdue (due 3/22)
  - TODO-608 API development pending (high priority), depends on incomplete database design
  - Overall progress behind by ~1 week (NOTE-604 conclusion)
  - Third-party API documentation block is the core bottleneck

  ### Gamma Project (Progress ~90%+, near completion)
  Meetings: evt_605 (client meeting 3/19) + evt_606 (delivery review 3/24)
  Notes: NOTE-605 (2 action items: both completed) + evt_606 has no meeting notes!
  To-dos (3): TODO-610 completed, TODO-611 completed, TODO-612 completed -> 3/3 completed = 100%
  Leads: Wang Ming (project manager), Zhao Lei (product manager)
  Note: 3/24 delivery review (evt_606) is missing meeting notes -- needs follow-up

  ## Scoring Criteria
  - 0.8-1.0: All three projects' progress accurate, Beta risks well identified, missing Gamma notes flagged, lead contact info included
  - 0.5-0.7: Most progress correct, major risks identified
  - 0.2-0.4: Progress incomplete or serious risk omissions
  - 0.0-0.1: Report not completed

reference_solution: |
  1. calendar_list_events() -> Get 8 meetings
  2. Classify by project: Alpha (evt_601, 602), Beta (evt_603, 604), Gamma (evt_605, 606), unrelated (evt_607, 608)
  3. notes_list() -> Get 5 notes
  4. notes_get(NOTE-601~605) -> Extract action items for each project
  5. Discover evt_606 (Gamma delivery review) has no corresponding notes
  6. todo_list_tasks(all) -> Get 12 to-do items
  7. Group by project and compare action items with to-do status
  8. contacts_search("Wang Ming") -> Alpha + Gamma lead contact info
  9. contacts_search("Zhao Lei") -> Beta + Gamma lead contact info
  10. contacts_search("Li Hua") -> Alpha architect contact info
  11. Produce progress reports for three projects:
     - Alpha: ~75%, on track, technical design pending
     - Beta: ~45%, delayed, 2 high-priority tasks blocked/overdue, high risk
     - Gamma: ~90%+, near completion, missing 3/24 delivery review notes

primary_dimensions: [completion, robustness, communication]
